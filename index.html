<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troy SD K-5 ELA — The Quantitative Case for Curriculum Change</title>
<meta name="description" content="Troy School District K-5 ELA curriculum analysis: pressure-testing Collaborative Literacy + UFLI Foundations against SEDA 2025.1 data and 50 peer/outperformer districts.">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0a1628;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 96px;
  }
  .slide {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border-radius: 4px;
    user-select: none;
    -webkit-user-drag: none;
  }
  /* Nav buttons */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 72px;
    height: 72px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    color: #fff;
    font-size: 28px;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: background 0.15s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .nav-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.25);
    transform: translateY(-50%) scale(1.05);
  }
  .nav-btn:active:not(:disabled) {
    transform: translateY(-50%) scale(0.95);
  }
  .nav-btn:disabled {
    opacity: 0.25;
    cursor: not-allowed;
  }
  .nav-btn.prev { left: 16px; }
  .nav-btn.next { right: 16px; }
  /* Counter */
  .counter {
    position: fixed;
    top: 16px;
    right: 24px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.85);
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
  }
  /* Section label */
  .label {
    position: fixed;
    top: 16px;
    left: 24px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    padding: 8px 14px;
    border-radius: 16px;
    font-size: 12px;
    font-weight: 500;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 10;
    max-width: calc(100% - 200px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  /* Progress bar */
  .progress {
    position: fixed;
    bottom: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, #1F7A3D, #1F3A5F);
    transition: width 0.3s ease;
    z-index: 10;
  }
  /* Bottom hint */
  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 10;
    font-weight: 500;
    letter-spacing: 0.5px;
    pointer-events: none;
  }
  /* Mobile */
  @media (max-width: 768px) {
    .stage { padding: 20px 60px; }
    .nav-btn { width: 48px; height: 48px; font-size: 20px; }
    .label { max-width: calc(100% - 140px); font-size: 10px; }
    .counter { font-size: 11px; padding: 6px 10px; }
  }
  /* Fullscreen tweaks */
  :fullscreen .stage,
  :-webkit-full-screen .stage {
    padding: 12px 80px;
  }
</style>
</head>
<body>

<div class="stage">
  <img class="slide" id="slide" alt="Slide" src="slides/01.png">
</div>

<div class="label" id="label">Title</div>
<div class="counter" id="counter">1 / 24</div>

<button class="nav-btn prev" id="prev" aria-label="Previous slide">←</button>
<button class="nav-btn next" id="next" aria-label="Next slide">→</button>

<div class="progress" id="progress" style="width: 4.16%;"></div>
<div class="hint">← → arrow keys  •  F fullscreen  •  Home/End for first/last</div>

<script>
  const TITLES = [
    "Title",
    "The question — and the one-line answer",
    "Pre-COVID — Troy was fine, even improving",
    "The post-COVID collapse is the real signal",
    "Troy ranks 47 of 49 nationally on pre/post-COVID Δ",
    "Of 8 MI affluent peers, Troy fell furthest",
    "Troy's worst subgroup declines are affluent ones",
    "The subgroup data refutes three common defenses",
    "Asian subgroup — Troy ranks 34 of 35",
    "Not-Econ-Disadvantaged subgroup — Troy ranks 42 of 46",
    "CKLA-adopting districts are leapfrogging their states",
    "How they did it — Marion County KY & Fond du Lac WI",
    "Recovery is possible — and curriculum-correlated",
    "Long Beach USD — the natural experiment",
    "The mechanism: why balanced literacy fails post-COVID",
    "Curriculum verdict — Troy's options on Section 35m list",
    "Recommendation — three paths ranked",
    "Curriculum is necessary but not sufficient — what to track",
    "Appendix — Methodology",
    "References (1 of 5) — Primary datasets",
    "References (2 of 5) — Curriculum evidence sources",
    "References (3 of 5) — SoR research & journalism",
    "References (4 of 5) — District case-study sources",
    "References (5 of 5) — Project artifacts + how to verify",
  ];
  const TOTAL = 24;
  let current = 1;

  // Pre-load all images for instant nav
  const cache = {};
  for (let i = 1; i <= TOTAL; i++) {
    const img = new Image();
    img.src = `slides/${String(i).padStart(2, "0")}.png`;
    cache[i] = img;
  }

  const slideEl = document.getElementById("slide");
  const counter = document.getElementById("counter");
  const label = document.getElementById("label");
  const prevBtn = document.getElementById("prev");
  const nextBtn = document.getElementById("next");
  const progressEl = document.getElementById("progress");

  function show(n) {
    n = Math.max(1, Math.min(TOTAL, n));
    current = n;
    const padded = String(n).padStart(2, "0");
    slideEl.src = `slides/${padded}.png`;
    counter.textContent = `${n} / ${TOTAL}`;
    label.textContent = TITLES[n - 1] || `Slide ${n}`;
    prevBtn.disabled = (n === 1);
    nextBtn.disabled = (n === TOTAL);
    progressEl.style.width = ((n / TOTAL) * 100).toFixed(2) + "%";
    // Update URL hash for shareable links
    history.replaceState(null, "", `#slide=${n}`);
  }
  function next() { show(current + 1); }
  function prev() { show(current - 1); }

  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);

  // Keyboard
  document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") {
      e.preventDefault(); next();
    } else if (e.key === "ArrowLeft" || e.key === "PageUp") {
      e.preventDefault(); prev();
    } else if (e.key === "Home") {
      e.preventDefault(); show(1);
    } else if (e.key === "End") {
      e.preventDefault(); show(TOTAL);
    } else if (e.key === "f" || e.key === "F") {
      e.preventDefault();
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    } else if (/^[0-9]$/.test(e.key)) {
      // Number keys 1-9 jump to that slide
      const n = parseInt(e.key, 10) || 10;
      if (n >= 1 && n <= TOTAL) show(n);
    }
  });

  // Touch swipe
  let touchStartX = null;
  document.addEventListener("touchstart", (e) => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  document.addEventListener("touchend", (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) {
      if (dx < 0) next(); else prev();
    }
    touchStartX = null;
  }, { passive: true });

  // Click on slide to advance (right half = next, left half = prev)
  slideEl.addEventListener("click", (e) => {
    const rect = slideEl.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x > rect.width / 2) next(); else prev();
  });

  // Init from URL hash if present
  const m = location.hash.match(/slide=(\d+)/);
  if (m) show(parseInt(m[1], 10));
  else show(1);
</script>

</body>
</html>
